user nginx;
# Two workers is plenty for static-behind-proxy: page-cache hits +
# sendfile saturate a NIC well before CPU. Avoids `auto` blowing up
# on big hosts (nginx reads /sys CPUs, not the cgroup limit).
worker_processes 2;
worker_rlimit_nofile 8192;
pid /var/run/nginx.pid;

# Dynamic modules (apk-installed). Order doesn't matter; both filter
# variants live alongside the static variants in the same .so.
load_module "modules/ngx_http_brotli_filter_module.so";
load_module "modules/ngx_http_brotli_static_module.so";
load_module "modules/ngx_http_zstd_filter_module.so";
load_module "modules/ngx_http_zstd_static_module.so";

events {
  # Behind a proxy, the upstream maintains a small pool of long-lived
  # connections. 512 per worker (× 2 workers = 1024) is far above what
  # any sane proxy will open.
  worker_connections 512;
  multi_accept off;
  use epoll;
}

http {
  include      /etc/nginx/mime.types;
  default_type application/octet-stream;

  log_format mini '$remote_addr - [$time_local] - $status - "$request" - "$http_referer" - $request_time - "$http_user_agent" - enc=$sent_http_content_encoding';

  error_log  /dev/stderr warn;
  access_log /dev/stdout mini;

  charset UTF-8;
  tcp_nopush on;
  sendfile on;
  tcp_nodelay on;
  # sendfile_max_chunk caps one transfer so a single large response can't
  # monopolize a worker — keeps tail latency predictable under load.
  sendfile_max_chunk 2m;
  server_tokens off;
  server_name_in_redirect off;
  server_names_hash_bucket_size 128;
  autoindex off;
  ignore_invalid_headers on;
  port_in_redirect off;
  # Behind a proxy: keep redirects relative so the internal container
  # hostname can never leak into a Location: header.
  absolute_redirect off;

  # Cache file descriptors + stat() results for hot static assets. 2000
  # entries comfortably covers a typical SPA's whole tree at well under
  # 200 KiB per worker; saves an open()+fstat() per request on hits.
  open_file_cache max=2000 inactive=60s;
  open_file_cache_valid 60s;
  open_file_cache_min_uses 2;
  open_file_cache_errors on;

  # ── Real-IP (always-behind-proxy) ───────────────────────────
  # Trust X-Forwarded-For from any RFC1918 / loopback / ULA hop. The
  # assumption is that nothing on the docker network reaches this nginx
  # except the trusted proxy (HAProxy / Traefik / Angie / nginx). Do NOT
  # expose port 80 directly to the internet — XFF would be spoofable.
  set_real_ip_from 127.0.0.0/8;
  set_real_ip_from ::1/128;
  set_real_ip_from 10.0.0.0/8;
  set_real_ip_from 172.16.0.0/12;
  set_real_ip_from 192.168.0.0/16;
  set_real_ip_from fd00::/8;
  real_ip_header   X-Forwarded-For;
  real_ip_recursive on;

  client_body_timeout 30s;
  send_timeout 30s;
  keepalive_timeout 65s;
  keepalive_requests 1000;
  client_max_body_size 64M;

  large_client_header_buffers 4 8k;

  # ── Compression ─────────────────────────────────────────────
  # Pre-compressed `.br` / `.zst` / `.gz` siblings (emitted at build time
  # by vite-plugin-compression2, webpack-plugin-zstd, etc.) are served
  # via the *_static directives — zero CPU on the hot path.
  #
  # Runtime brotli/zstd are intentionally OFF: behind a proxy the only
  # responses without precompressed siblings are tiny dynamic ones
  # (/healthz, /ping, error pages) where compression isn't worth the
  # cycles. gzip stays on as a universal runtime fallback for anything
  # else (and for clients/proxies that don't advertise br/zstd).

  brotli_static on;
  zstd_static on;

  gzip_static on;
  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_comp_level 5;
  gzip_min_length 400;
  gzip_types
    text/css
    text/xml
    text/plain
    text/javascript
    application/javascript
    application/json
    application/x-javascript
    application/xml
    application/xml+rss
    application/xhtml+xml
    application/wasm
    application/manifest+json
    application/x-font-ttf
    application/x-font-opentype
    application/vnd.ms-fontobject
    font/ttf
    font/otf
    font/woff
    font/woff2
    image/svg+xml
    image/x-icon
    application/rss+xml
    application/atom_xml;

  # ── Default site (port 80) ──────────────────────────────────
  # SPA-friendly defaults: serves /app, falls back to /index.html for
  # client-side routes, caches hashed /assets/ aggressively, and emits
  # baseline security headers. Replace this block in a consumer image by
  # COPYing your own /etc/nginx/conf.d/default.conf AFTER setting
  # `include /etc/nginx/conf.d/*.conf;` here.
  server {
    listen 80 default_server reuseport;
    listen [::]:80 default_server reuseport;

    root /app;
    index index.html;

    # Baseline security headers for HTML responses. CSP intentionally
    # absent — must be tuned per app. Note: any `location` that adds its
    # own header overrides (does NOT merge with) these, so locations
    # below that set Cache-Control won't carry these headers.
    add_header X-Content-Type-Options    "nosniff"                                    always;
    add_header X-Frame-Options           "SAMEORIGIN"                                 always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"            always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()"   always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # Block dotfiles (.git, .env, .htaccess, …) from ever being served.
    location ~ /\. {
      deny all;
    }

    # Liveness probe for orchestrators that hit :80 instead of :8080.
    # /healthz on :8080 is the canonical one (used by HEALTHCHECK).
    location = /ping {
      allow 127.0.0.1;
      allow ::1;
      deny all;
      access_log off;
      add_header Content-Type text/plain;
      return 200 "pong";
    }

    # Hashed assets — Vite/webpack emit content-hashed filenames here, so
    # immutable + 1y is safe.
    location /assets/ {
      access_log off;
      expires 1y;
      add_header Cache-Control "public, immutable";
      try_files $uri =404;
    }

    # Other long-lived static assets. Shorter TTL since filenames aren't
    # guaranteed content-hashed.
    location ~* \.(svg|ico|png|jpg|jpeg|gif|webp|avif|woff|woff2|ttf|eot)$ {
      access_log off;
      expires 7d;
      add_header Cache-Control "public";
      try_files $uri =404;
    }

    # index.html is never cached — required for the per-request CSP nonce
    # stamping pattern most SPAs use.
    location = /index.html {
      add_header Cache-Control "no-store, must-revalidate";
    }

    # SPA fallback: serve index.html for any unmatched path so client-
    # side routers (Vue Router, React Router, …) handle deep links.
    location / {
      try_files $uri $uri/ /index.html;
    }
  }

  # ── Metrics + healthz server (port 8080) ────────────────────
  # Internal-only. nginx-prometheus-exporter scrapes /stub_status here;
  # /healthz is hit by the Docker HEALTHCHECK and by orchestrators.
  # Both are restricted to RFC1918 + loopback so an accidental publish
  # of :8080 to the host doesn't leak metrics to the public internet.
  server {
    listen 8080;
    listen [::]:8080;
    server_name _;
    access_log off;

    location = /stub_status {
      stub_status;
      allow 127.0.0.1;
      allow ::1;
      allow 10.0.0.0/8;
      allow 172.16.0.0/12;
      allow 192.168.0.0/16;
      allow fd00::/8;
      deny all;
    }

    location = /healthz {
      add_header Content-Type text/plain;
      return 200 "ok\n";
    }

    location / { return 404; }
  }
}
